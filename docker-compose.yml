version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: citizen_assistant_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/app.env
    volumes:
      - ./backend/auth.db:/app/auth.db
      - ./backend/chroma_db:/app/chroma_db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citizen_assistant_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
